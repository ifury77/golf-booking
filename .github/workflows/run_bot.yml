name: NSRCC Saturday Snipe
on:
  schedule:
    # 09:58 UTC is 17:58 (5:58 PM) Singapore Time
    # This runs every Wednesday to catch the 6pm opening
    - cron: '58 9 * * 3'
  workflow_dispatch:

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
      - name: Execute Booking
        run: python booking_agent.py
