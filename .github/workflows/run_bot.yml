name: NSRCC Multi-Day Sniper
on:
  schedule:
    # 09:58 UTC is 5:58 PM Singapore Time.
    # Runs WEDNESDAY (3) for the May 1st one-off test.
    # Runs THURSDAY (4) for every Saturday evergreen.
    - cron: '58 9 * * 3,4'
  workflow_dispatch: # Allows you to manually trigger if needed

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: |
          pip install playwright
          playwright install chromium
      - name: Execute
        run: python booking_agent.py
