name: NSRCC Multi-Day Sniper
on:
  schedule:
    # 09:50 UTC is 5:50 PM Singapore Time.
    # This runs every Wednesday and Thursday.
    - cron: '50 9 * * 3,4'
  workflow_dispatch: 

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Tools
        run: |
          pip install playwright
          playwright install chromium
      - name: Execute
        run: python booking_agent.py
