name: NSRCC Saturday Snipe
on:
  schedule:
    # Runs at 08:59:45 AM Singapore Time (00:59:45 UTC) every Wednesday
    - cron: '59 0 * * 3'
  workflow_dispatch: # This adds a 'Run' button so you can test it NOW

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
      - name: Execute Booking
        run: python booking_agent.py
